<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruitment Rejection Mailer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="relative min-h-screen overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_#1e3a8a_0,_#020617_45%)] opacity-80"></div>
    <main class="relative z-10 max-w-3xl mx-auto px-6 py-14">
      <section class="backdrop-blur-xl bg-white/10 border border-white/20 shadow-2xl rounded-3xl p-8">
        <h1 class="text-3xl font-bold">Automated Rejection Email Dashboard</h1>
        <p class="mt-2 text-slate-300">Upload a candidate CSV and send professional follow-up emails.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="mt-6 space-y-2">
              {% for message in messages %}
                <div class="rounded-lg border border-rose-400/40 bg-rose-500/20 px-4 py-2 text-rose-100">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form class="mt-8 space-y-5" action="{{ url_for('process_csv') }}" method="post" enctype="multipart/form-data">
          <div>
            <label for="csv_file" class="block mb-2 text-sm font-medium">CSV File (Name, Email)</label>
            <input id="csv_file" name="csv_file" type="file" accept=".csv" required
                   class="w-full rounded-xl border border-white/20 bg-white/10 file:mr-4 file:border-0 file:bg-blue-600 file:px-4 file:py-2 file:text-white px-3 py-3 text-slate-100" />
          </div>

          <div>
            <label for="form_url" class="block mb-2 text-sm font-medium">Google Form URL</label>
            <input id="form_url" name="form_url" type="url" required value="{{ default_form_url }}"
                   class="w-full rounded-xl border border-white/20 bg-white/10 px-4 py-3 text-slate-100 placeholder:text-slate-400" />
          </div>

          <label class="flex items-center gap-3 rounded-xl border border-cyan-400/30 bg-cyan-400/10 p-3">
            <input type="checkbox" name="dry_run" class="h-4 w-4 accent-cyan-400">
            <span class="text-sm">Dry run mode (validate and log only, do not send emails)</span>
          </label>

          <button type="submit" class="w-full rounded-xl bg-blue-600 hover:bg-blue-500 transition py-3 font-semibold">
            Process CSV
          </button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
