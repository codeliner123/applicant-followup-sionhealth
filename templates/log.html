<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 px-6 py-10">
  <div class="max-w-5xl mx-auto backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-6 shadow-2xl">
    <div class="flex justify-between items-center">
      <h1 class="text-2xl font-bold">mail_log.txt</h1>
      <a href="{{ url_for('results') }}" class="rounded-xl bg-slate-700 px-4 py-2 hover:bg-slate-600">Back to Results</a>
    </div>
    <pre class="mt-6 whitespace-pre-wrap break-words rounded-xl bg-black/40 border border-white/10 p-4 text-xs leading-relaxed">{{ log_content }}</pre>
  </div>
</body>
</html>
